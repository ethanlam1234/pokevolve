const POKE_TYPES = ['Fire','Water','Grass','Electric','Psychic','Ice','Dragon',
  'Dark','Steel','Normal','Fighting','Poison','Ground','Flying','Bug','Rock','Ghost','Fairy'];
function getPokeTypes(name) {
  let h1=0, h2=7;
  for(let i=0;i<name.length;i++){
    h1=(h1*31+name.charCodeAt(i))%POKE_TYPES.length;
    h2=(h2*13+name.charCodeAt(i))%POKE_TYPES.length;
  }
  if(h1===h2) h2=(h2+3)%POKE_TYPES.length;
  return [POKE_TYPES[h1], POKE_TYPES[h2]];
}

// Extract pokedex numbers from fusion name string
// e.g. "final_107-hitmonchan_119-seaking_Hitmoking" → ["107", "119"]
function getPokedexNums(fusionName) {
  const matches = fusionName.match(/(\d+)-[a-z]/g);
  if(matches && matches.length>=2) {
    return [matches[0].split('-')[0], matches[1].split('-')[0]];
  }
  // fallback: parse from img URL if available
  const m2 = fusionName.match(/\d+/g);
  if(m2 && m2.length>=2) return [m2[0], m2[1]];
  return ['?','?'];
}

function deckVal(n) {
  const map = {1:'A',2:'2',3:'4',4:'6',5:'8',6:'J',7:'Q',8:'K'};
  return map[n] || String(n);
}

function mkCard(f) {
  const kws = assignKeywords(f.cost, f.baseTaunt);
  const types = getPokeTypes(f.name);
  // Extract pokedex numbers from the fusion image URL (most reliable source)
  let dexA='?', dexB='?';
  if(f.img) {
    const m = f.img.match(/final_(\d+)-[^_]+_(\d+)-/);
    if(m) { dexA=m[1]; dexB=m[2]; }
  }
  return {
    name:f.name, img:nextCardImg(),
    fusionImg:f.img,
    atk:f.baseAtk, hp:f.baseHp, maxHp:f.baseHp,
    cost:f.cost, keywords:kws,
    // Pokedex numbers for display (shown instead of A/K style)
    dexA, dexB,
    type1:types[0], type2:types[1],
    canAttack:false, exhausted:true,
    divineShieldUp:kws.includes('divine_shield'),
    attacksLeft:0, frozen:false, stealthed:false,
    id:Math.random().toString(36).slice(2),
  };
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

let G_selected = new Set();
let G_sort_mode = 'species';
const _tiltCache = {};
function getTilt(id) {
  if(!_tiltCache[id]) _tiltCache[id] = (Math.random() * 10 - 5).toFixed(2);
  return _tiltCache[id];
}

function sortHand(mode) {
  if(typeof SFX!=='undefined') SFX.sortToggle();
  G_sort_mode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode)?.classList.add('active');
  // Remember which CARDS (by identity) are selected before reorder
  const selectedCards = new Set(Array.from(G_selected).map(i => G.hand[i]).filter(Boolean));
  if(mode === 'species') G.hand.sort((a,b) => (parseInt(a.dexA)||0)-(parseInt(b.dexA)||0));
  else if(mode === 'type') G.hand.sort((a,b) => (a.type1||'').localeCompare(b.type1||''));
  // Restore selection by new indices
  G_selected = new Set(G.hand.map((c,i) => selectedCards.has(c) ? i : -1).filter(i => i >= 0));
  renderHand();
}

function makeHcEl(card, i, isHidden) {
  const el = document.createElement('div');
  el.className = 'hc';
  el._card = card; // store reference for FLIP animation matching
  const tilt = getTilt(card.id || (card.name + i));
  el.style.setProperty('--tilt', tilt + 'deg');
  el.style.setProperty('--dx', '0px');
  el.style.setProperty('--dy', '0px');
  // Position-aware z-index: base order preserved, selected cards lift above unselected
  el.style.zIndex = G_selected.has(i) ? (50 + i) : (2 + i);
  if(G_selected.has(i)) el.classList.add('selected-hand');
  if(isHidden) { el.style.visibility = 'hidden'; el.style.pointerEvents = 'none'; }
  const art = document.createElement('img');
  art.className = 'hc-art'; art.draggable = false;
  removeWhiteBg(card.fusionImg || card.img, url => { art.src = url; });
  el.appendChild(art);
  if(card.type1) el.appendChild(typeBadge(card.type1, 'hc-type1'));
  if(card.type2) el.appendChild(typeBadge(card.type2, 'hc-type2'));
  const ring = document.createElement('div'); ring.className = 'hc-select-ring';
  el.appendChild(ring);
  el.addEventListener('click', () => toggleHandSelect(i));
  el.addEventListener('mouseenter', () => { if(typeof SFX!=='undefined') SFX.hover(); });
  const floatDur = 2.8 + (i * 0.22) % 1.0; // 2.8-3.8s range
  // Negative delays = animation already in progress (staggered, no waiting)
  // Negative value is -phase into the cycle so each card is at a different point
  const floatDelay = -((i * 0.55) % floatDur);
  el.style.setProperty('--float-dur',   floatDur.toFixed(2) + 's');
  el.style.setProperty('--float-delay', floatDelay.toFixed(2) + 's');
  // hc-floating added after FLIP animation by animateHandReflow
  // (for renderHand path, add immediately)
  el._addFloatAfterFlip = true; // flag: animateHandReflow will add it
  return el;
}

function renderHand(animateLast) {
  // Don't wipe the container while a reflow animation is in progress
  if(window._reflowAnimating) return;
  if(G.hand && G.hand.length && typeof renderHandsPanel === 'function') setTimeout(renderHandsPanel, 0);
  const hc = document.getElementById('hand-container');
  if(!hc) return;
  hc.innerHTML = '';
  G_selected = new Set(Array.from(G_selected).filter(i => i < G.hand.length));
  const n = G.hand.length;
  if(n === 0) { updateActionBar(); return; }

  G.hand.forEach((card, i) => {
    if(i >= 8) return;
    const hidden = _dealAnimating.has(i) || (animateLast && i === n - 1);
    const el = makeHcEl(card, i, hidden);
    if(!_dealAnimating.has(i) && animateLast && i === n - 1) {
      const tilt = parseFloat(el.style.getPropertyValue('--tilt')) || 0;
      requestAnimationFrame(() => dealFromDeckToHand(el, card, 'ours', tilt, i));
    }
    el.classList.add('hc-float-enter');
    el.classList.add('hc-floating');
    el._addFloatAfterFlip = false;
    hc.appendChild(el);
    // Remove entry transition after it's no longer needed
    setTimeout(()=>{ el.classList.remove('hc-float-enter'); }, 450);
  });
  updateActionBar();
}

function toggleHandSelect(idx) {
  if(window._reflowAnimating && !G.animating) window._reflowAnimating = false;
  if(!G.ourTurn || G.animating) return;
  const hcEls = [...document.querySelectorAll('#hand-container .hc')];

  if(G_selected.has(idx)) {
    G_selected.delete(idx);
    const elD = hcEls[idx];
    if(elD) { elD.classList.remove('selected-hand'); elD.style.zIndex = 2 + idx; }
    if(typeof SFX!=='undefined') SFX.cardDeselect();
  } else {
    if(G_selected.size >= 5) {
      const first = G_selected.values().next().value;
      G_selected.delete(first);
      const elF = hcEls[first];
      if(elF) { elF.classList.remove('selected-hand'); elF.style.zIndex = 2 + first; }
    }
    G_selected.add(idx);
    const elA = hcEls[idx];
    if(elA) { elA.classList.remove('selected-hand'); elA.classList.add('selected-hand'); elA.style.zIndex = 50 + idx; }
    if(typeof SFX!=='undefined') SFX.cardSelect();
  }
  // Update action bar without rebuilding hand DOM
  updateActionBar();
}

function updateActionBar() {
  const sel = G_selected.size;
  const playBtn = document.getElementById('play-btn');
  const discardBtn = document.getElementById('discard-btn');
  if(playBtn)   { playBtn.disabled = sel === 0;    playBtn.textContent   = sel > 0 ? `PLAY HAND (${sel})` : 'PLAY HAND'; }
  if(discardBtn){ discardBtn.disabled = sel === 0; discardBtn.textContent = sel > 0 ? `DISCARD (${sel})` : 'DISCARD'; }
  // Live hand name preview in left panel
  const nameEl = document.getElementById('rp-hand-name');

    if(sel === 0) {
      nameEl.textContent = '—';
      nameEl.className = 'no-hand';
      if(_activeHandType) { _activeHandType = null; renderHandsPanel(); }
    } else {
      const selectedCards = Array.from(G_selected).sort((a,b)=>a-b).map(i=>G.hand[i]).filter(Boolean);
      const result = evaluateHand(selectedCards);
      nameEl.textContent = result?.name || '—';
      nameEl.className = (result && result.name !== 'No Hand') ? '' : 'no-hand';
      // Sync active chip on hands panel
      const detectedName = result?.name;
      if(detectedName && detectedName !== 'No Hand') {
        if(_activeHandType !== detectedName) {
          _activeHandType = detectedName;
          renderHandsPanel();
        }
      } else {
        // Check if remaining selection still matches the active hand type
        if(_activeHandType) {
          const stillMatches = detectedName === _activeHandType;
          if(!stillMatches) {
            _activeHandType = null;
            renderHandsPanel();
          }
        }
      }
    }
  }
  updatePlayHandBtn();
}

  if(typeof SFX!=='undefined') SFX.discard();
  if(!G.ourTurn || G.animating || G_selected.size === 0) return;
  if(G.discardsLeft <= 0) {
    // Show "no discards" message where score overlay appears

    inner.style.cssText = 'font-family:PokemonClassic,monospace;font-size:clamp(11px,1.2vw,16px);color:#ff6655;background:rgba(8,10,26,0.92);border:2px solid rgba(200,60,40,0.6);border-radius:8px;padding:10px 22px;letter-spacing:1px;box-shadow:0 4px 18px rgba(0,0,0,0.7);';

  const discEl = document.getElementById('rp-discards');
  if(discEl) discEl.textContent = G.discardsLeft;

  const selectedIndices = Array.from(G_selected).sort((a,b) => a-b);
  const hcEls = [...document.querySelectorAll('#hand-container .hc')];
  const FLY_DUR = 0.52, STAGGER = 0.07;

  // Phase 1: fly selected cards off screen (3D Balatro style)
  selectedIndices.forEach((idx, n) => {
    const orig = hcEls[idx];
    if(!orig) return;
    const rect = orig.getBoundingClientRect();
    const ghost = document.createElement('div');
    ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;border-radius:8px;overflow:hidden;background:#ffffff;border:2px solid rgba(50,70,140,0.8);z-index:500;pointer-events:none;perspective:600px;transform-style:preserve-3d;transform:rotate(${parseFloat(orig.style.getPropertyValue('--tilt'))||0}deg);box-shadow:0 4px 14px rgba(0,0,0,0.8);will-change:transform,opacity;`;
    const artImg = orig.querySelector('.hc-art');
    if(artImg){ const gi=document.createElement('img');gi.src=artImg.src;gi.draggable=false;gi.style.cssText=`position:absolute;top:6%;bottom:10%;left:50%;transform:translateX(-50%);height:84%;width:auto;object-fit:contain;image-rendering:pixelated;`;ghost.appendChild(gi); }
    orig.querySelectorAll('.hc-type1,.hc-type2').forEach(b=>ghost.appendChild(b.cloneNode(true)));
    document.body.appendChild(ghost);
    orig.style.opacity = '0';
    orig.style.pointerEvents = 'none';
    setTimeout(() => {
      const tilt = parseFloat(orig.style.getPropertyValue('--tilt')) || 0;
      ghost.style.transition = `transform ${FLY_DUR}s cubic-bezier(0.25,0,0.6,0.8), opacity ${FLY_DUR}s ease`;
      ghost.style.transform = `rotate(${tilt-15}deg) translateX(${window.innerWidth*0.6+200}px) translateY(-50px) rotateY(-65deg) rotateZ(-16deg) scale(0.45)`;
      ghost.style.opacity = '0';
      setTimeout(() => ghost.remove(), FLY_DUR*1000+50);
    }, n * STAGGER * 1000);
  });

  const flyWait = Math.round((FLY_DUR + selectedIndices.length*STAGGER)*1000) + 60;
  await delay(flyWait);

  // animateHandReflow handles: collapse → draw new cards → sort → slide all to positions
  await animateHandReflow(selectedIndices, () => {
    G.animating = false;
    renderHandsPanel();
    updateRunPanel();
  });
}

// ═══════════════════════════════════════════════════════════════
// BALATRO-STYLE FAN DRAW ANIMATION
//
// Each card has a computed fan position based on its index and total count.
// When a card is added: all cards animate to new N+1 fan positions,
// new card ghost flies from deck and lands at its fan slot.
// This creates the "hand spreads to accommodate new card" Balatro look.
// ═══════════════════════════════════════════════════════════════

// ── CARD SORTING HELPER ─────────────────────────────────────────
function sortKey(card) {
  if(G_sort_mode === 'type') return (card.type1||'zzz') + (card.type2||'zzz') + (card.name||'');
  return String(parseInt(card.dexA)||999).padStart(4,'0') + (card.name||'');
}

// Measure screen positions of N .hc slots in the centred flex hand
function measureSlots(n) {
  const hc = document.getElementById('hand-container');
  if(!hc || n<=0) return [];
  const tmp=[];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='hc';
    d.style.cssText='visibility:hidden;pointer-events:none;flex-shrink:0;';
    d.style.setProperty('--tilt','0deg'); d.style.setProperty('--dx','0px');
    hc.appendChild(d); tmp.push(d);
  }
  void hc.getBoundingClientRect();
  const pos=tmp.map(d=>{const r=d.getBoundingClientRect();return{cx:r.left+r.width/2,cy:r.top+r.height/2};});
  tmp.forEach(d=>d.remove());
  return pos;
}

// Slide elements from their current screen positions to new positions via --dx rAF
async function slideElsToPositions(els, targets, dur) {
  if(!els.length) return;
  const hc = document.getElementById('hand-container');
  // Snapshot where each element is NOW
  const fromCx = els.map(el=>{const r=el.getBoundingClientRect();return r.left+r.width/2;});
  // Set --dx so they appear at their CURRENT position
  els.forEach((el,i)=>{
    const tx = targets[i]?.cx ?? fromCx[i];
    el.style.setProperty('--dx',(fromCx[i]-tx)+'px');
  });
  void hc?.getBoundingClientRect();
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  // Animate --dx to 0
  const t0=performance.now();
  const dx0=els.map(el=>parseFloat(el.style.getPropertyValue('--dx')||'0'));
  const ease=t=>t<0.5?2*t*t:-1+(4-2*t)*t;
  await new Promise(resolve=>{
    function frame(now){
      const t=Math.min(1,(now-t0)/dur),e=ease(t);
      els.forEach((el,i)=>el.style.setProperty('--dx',(dx0[i]*(1-e))+'px'));
      if(t<1)requestAnimationFrame(frame);
      else{els.forEach(el=>el.style.setProperty('--dx','0px'));resolve();}
    }
    requestAnimationFrame(frame);
  });
}

// ── MAIN SEQUENCE: after discard/play ───────────────────────────
// 1. Collapse removed cards
// 2. Compute NEW full sorted hand (existing alive + cards from deck)
// 3. Measure where all 8 cards will sit
// 4. Existing cards slide to their new sorted positions
// 5. New cards fly ghost arcs from deck to their sorted positions
// All motions happen simultaneously → smooth Balatro-style refill
async function animateHandReflow(deadIndices, callback) {
  const hc = document.getElementById('hand-container');
  if(!hc){if(callback)callback();return;}

  window._reflowAnimating = true;

  const allEls = [...hc.querySelectorAll('.hc')];
  const deadSet = new Set(deadIndices);
  const deadEls  = allEls.filter((_,i)=>deadSet.has(i));
  const aliveEls = allEls.filter((_,i)=>!deadSet.has(i));

  // ── Step 1: collapse dead cards instantly ──────────────────────
  deadEls.forEach(el=>{
    el.style.cssText += ';width:0;min-width:0;margin:0;padding:0;overflow:hidden;opacity:0;transition:none;';
  });
  void hc.getBoundingClientRect();

  // ── Step 2: figure out the full new hand after draw ────────────
  // Remove dead cards from G.hand
  const toRemove = deadIndices.slice().sort((a,b)=>b-a);
  toRemove.forEach(i=>{if(G.hand[i])G.hand.splice(i,1);});
  G_selected.clear(); _activeHandType=null;

  // Draw new cards into G.hand
  const toDraw = Math.min(8-G.hand.length, G.deck.length);
  const newCards = [];
  for(let i=0;i<toDraw;i++){
    if(!G.deck.length||G.hand.length>=8)break;
    const c={...G.deck.shift()};
    G.hand.push(c);
    newCards.push(c);
  }

  // Sort the full new hand
  G.hand.sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));

  // ── Step 3: measure where all 8 cards will sit ─────────────────
  const slots = measureSlots(G.hand.length); // positions for every card
  // slots[i] = where G.hand[i] should appear on screen

  // ── Step 4: match each alive DOM element to its new G.hand index ─
  // aliveEls[j] was G.hand[aliveOriginalIndices[j]] — now we need to
  // find where that card ended up in the sorted hand.
  // We'll match by card object reference.
  // Build a map: card → new sorted index
  const cardToNewIdx = new Map(G.hand.map((c,i)=>[c,i]));

  // For each alive el, find its card's new position
  // aliveEls are the survivors (after dead removed), in original DOM order
  // Their cards are the alive portion of the pre-splice G.hand
  // We need to know which card each aliveEl represents.
  // Since we already spliced G.hand, we can't look them up by index anymore.
  // So we stored the card reference on the element — or we need another way.
  // Solution: before splicing, we tagged alive els in discardSelected.
  // Actually aliveEls were captured BEFORE splice. The alive cards are
  // G.hand AFTER splice but BEFORE newCards were added, in their original order.
  // After sort, we need to find each alive card's new index.
  // We'll use the data stored in the DOM: each .hc has an img src we can match,
  // or better: we store card ref on element.
  // Simplest: rebuild all DOM elements from sorted G.hand in one go.
  // But we need to animate FROM current positions TO new positions.

  // Approach: renderHand(false) gives us clean sorted elements at final positions.
  // FLIP: snapshot current positions, render, compute deltas, animate.

  // Snapshot alive card positions by card object reference (reliable)
  const cardToCx = new Map();
  aliveEls.forEach(el=>{
    if(el._card) {
      const r=el.getBoundingClientRect();
      cardToCx.set(el._card, r.left+r.width/2);
    }
  });

  // ── Step 5: rebuild DOM in sorted order ───────────────────────
  hc.innerHTML='';
  window._reflowAnimating = true;
  const allNewEls = G.hand.map((card,i)=>{
    const el = makeHcEl(card,i,false);
    // Do NOT add hc-floating yet — would start animation before FLIP offsets are set
    el._addFloatAfterFlip = false;
    hc.appendChild(el);
    return el;
  });

  // Force layout so final positions are computed
  void hc.getBoundingClientRect();

  // ── Step 6: Deck position (source of new cards) ───────────────
  const deckEl = document.getElementById('deck-ours');
  const deckRect = deckEl?.getBoundingClientRect();
  const deckCx = deckRect ? deckRect.left+deckRect.width/2 : window.innerWidth-80;
  const deckCy = deckRect ? deckRect.top+deckRect.height/2 : window.innerHeight*0.6;

  // Separate existing vs new card elements
  const existingEls = allNewEls.filter((_,i)=>!newCards.includes(G.hand[i]));
  const newEls      = allNewEls.filter((_,i)=> newCards.includes(G.hand[i]));

  // ── PHASE 1: existing cards slide to sorted positions (300ms) ──
  // New card elements stay invisible during this phase
  newEls.forEach(el=>{
    el.style.opacity='0';
    el.style.pointerEvents='none';
  });

  // Read final positions and compute FLIP offsets for existing cards
  const existingFinals = existingEls.map(el=>{
    const r=el.getBoundingClientRect();
    return {cx:r.left+r.width/2, cy:r.top+r.height/2};
  });

  existingEls.forEach((el,i)=>{
    const card=G.hand[allNewEls.indexOf(el)];
    const fromCx = cardToCx.get(card) ?? existingFinals[i].cx;
    const delta = fromCx - existingFinals[i].cx; // positive = came from right
    // Tilt: moving right → lean right (+), moving left → lean left (-)
    // Add small random variance (±1.5deg)
    const rng = (Math.random()-0.5)*3;
    const tiltDeg = (delta > 0 ? 4 : delta < 0 ? -4 : 0) + rng;
    el.style.setProperty('--dx', delta+'px');
    el.style.setProperty('--dy', '0px');
    el.style.setProperty('--slide-tilt', tiltDeg+'deg');
    el.style.transition='none';
  });
  void hc.getBoundingClientRect();
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

  // Animate existing cards to final positions with motion tilt
  const P1_DUR=300, ease=t=>t<0.5?2*t*t:-1+(4-2*t)*t;
  const p1dx=existingEls.map(el=>parseFloat(el.style.getPropertyValue('--dx')||'0'));
  const p1tilt=existingEls.map(el=>parseFloat(el.style.getPropertyValue('--slide-tilt')||'0'));

  await new Promise(resolve=>{
    const t0=performance.now();
    function frame(now){
      const t=Math.min(1,(now-t0)/P1_DUR), e=ease(t);
      // Tilt peaks at t=0.5 then unwinds back to base tilt
      const tiltFactor = Math.sin(t*Math.PI);
      existingEls.forEach((el,i)=>{
        el.style.setProperty('--dx',(p1dx[i]*(1-e))+'px');
        // Add motion tilt on top of card's base --tilt via inline override
        const baseTilt=parseFloat(el.style.getPropertyValue('--tilt')||'0');
        el.style.setProperty('--tilt',(baseTilt + p1tilt[i]*tiltFactor-p1tilt[i]*tiltFactor).toFixed(2)+'deg');
      });
      // Actually animate tilt via a separate var to not corrupt --tilt permanently
      existingEls.forEach((el,i)=>{
        el.style.setProperty('--motion-tilt',(p1tilt[i]*tiltFactor).toFixed(2)+'deg');
      });
      if(t<1)requestAnimationFrame(frame);
      else{
        existingEls.forEach(el=>{
          el.style.setProperty('--dx','0px');
          el.style.setProperty('--motion-tilt','0deg');
        });
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });

  // ── PHASE 2: brief pause (100ms) ──────────────────────────────
  await new Promise(r=>setTimeout(r,100));

  // ── PHASE 3: new cards slide in from deck, staggered ──────────
  const P3_DUR=320, STAGGER=80;

  // Read final positions of new card elements
  newEls.forEach(el=>{
    el.style.opacity='1';
    el.style.transition='none';
  });
  void hc.getBoundingClientRect();

  const newFinals = newEls.map(el=>{
    const r=el.getBoundingClientRect();
    return {cx:r.left+r.width/2, cy:r.top+r.height/2};
  });

  // Set initial positions (at deck) for all new cards
  newEls.forEach((el,i)=>{
    el.style.setProperty('--dx',(deckCx-newFinals[i].cx)+'px');
    el.style.setProperty('--dy',(deckCy-newFinals[i].cy)+'px');
    el.style.setProperty('--motion-tilt','0deg');
  });
  void hc.getBoundingClientRect();
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

  // Animate each new card with stagger
  const newCardPromises = newEls.map((el,i)=>new Promise(resolve=>{
    const startDx=parseFloat(el.style.getPropertyValue('--dx')||'0');
    const startDy=parseFloat(el.style.getPropertyValue('--dy')||'0');
    // Tilt: moving left (negative dx) = lean right slightly (like thrown card)
    const rng=(Math.random()-0.5)*4;
    const motionTilt = (startDx < 0 ? 5 : -5) + rng; // lean into direction of travel

    setTimeout(()=>{
      const t0=performance.now();
      function frame(now){
        const t=Math.min(1,(now-t0)/P3_DUR), e=ease(t);
        const tiltFactor=Math.sin(t*Math.PI);
        el.style.setProperty('--dx',(startDx*(1-e))+'px');
        el.style.setProperty('--dy',(startDy*(1-e))+'px');
        el.style.setProperty('--motion-tilt',(motionTilt*tiltFactor).toFixed(2)+'deg');
        if(t<1)requestAnimationFrame(frame);
        else{
          el.style.setProperty('--dx','0px');
          el.style.setProperty('--dy','0px');
          el.style.setProperty('--motion-tilt','0deg');
          resolve();
        }
      }
      requestAnimationFrame(frame);
    }, i*STAGGER);
  }));

  await Promise.all(newCardPromises);

  // Restore all cards — clear every inline override so CSS takes over
  allNewEls.forEach(el=>{
    el.style.opacity = '';
    el.style.pointerEvents = '';
    el.style.visibility = '';
    // Clear motion vars
    el.style.setProperty('--dx','0px');
    el.style.setProperty('--dy','0px');
    el.style.setProperty('--motion-tilt','0deg');
  });
  // Add float: keep transition:none while animation takes over,
  // then restore CSS transitions on the next paint.
  allNewEls.forEach(el=>{
    el.style.transition = 'none'; // freeze any ongoing transition
    el.classList.add('hc-floating');
  });
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      allNewEls.forEach(el=>{ el.style.transition = ''; });
    });
  });

  window._reflowAnimating = false;
  if(callback)callback();
}

function autoFillHand(callback) {
  // autoFillHand is now handled inside animateHandReflow
  // This is only called from non-discard paths (initial deal, battle start)
  const needed=Math.max(0,8-G.hand.length);
  const toDraw=Math.min(needed,G.deck.length);
  if(toDraw===0){if(callback)setTimeout(callback,100);return;}
  for(let i=0;i<toDraw;i++){
    if(!G.deck.length||G.hand.length>=8)break;
    G.hand.push({...G.deck.shift()});
  }
  renderHand(false);
  if(callback)setTimeout(callback,100);
}


// ── CINNABAR MANSION: Fuse 2 Pokémon ─────────────────────────────
let _cinnabarSelected = []; // indices into G.deck of selected cards

function openCinnabarMansion() {
  hideGameUIForInterlude();
  _cinnabarSelected = [];
  const row = document.getElementById('cinnabar-hand-row');
  if(!row) return;
  row.innerHTML = '';

  // Show a random sample of 5 basic pokemon from the deck + some extras
  const basicCards = G.deck.filter(c => c.dexB === null || c.dexB === undefined).slice(0, 8);
  // Add a few randoms if not enough
  while(basicCards.length < 5) {
    const d = Math.floor(Math.random()*143)+1;
    const c = mkBasicCard(d);
    if(c) basicCards.push(c);
  }
  const show = basicCards.slice(0,6);

  show.forEach((card, i) => {
    const wrap = makeCardVisual(card, `width:clamp(120px,12vw,160px);aspect-ratio:2/3;transition:transform 0.2s,border-color 0.2s;`);
    wrap.dataset.idx = i;
    wrap.addEventListener('mouseenter', () => { if(typeof SFX!=='undefined') SFX.hover(); });
    wrap.addEventListener('mouseenter', () => { if(typeof SFX!=='undefined') SFX.hover(); });
    wrap.addEventListener('click', () => {
      const alreadyIdx = _cinnabarSelected.indexOf(i);
      if(alreadyIdx >= 0) {
        _cinnabarSelected.splice(alreadyIdx, 1);
        wrap.classList.remove('cv-selected');
        if(typeof SFX!=='undefined') SFX.cardDeselect();
      } else if(_cinnabarSelected.length < 2) {
        // Prevent selecting the same Pokémon species twice
        const existingCard = _cinnabarSelected.length > 0 ? show[_cinnabarSelected[0]] : null;
        const sameSpecies = existingCard && (
          (card.dexA && existingCard.dexA && card.dexA === existingCard.dexA) ||
          (card.name && existingCard.name && card.name === existingCard.name)
        );
        if(sameSpecies) {
          // Flash the card red briefly to indicate it's blocked
          wrap.style.transition='border-color 0.1s';
          wrap.style.borderColor='rgba(255,60,60,0.9)';
          setTimeout(()=>{ wrap.style.borderColor=''; }, 500);
          if(typeof SFX!=='undefined') SFX.error();
        } else {
          _cinnabarSelected.push(i);
          wrap.classList.add('cv-selected');
          if(typeof SFX!=='undefined') SFX.cardSelect();
        }
      }
      updateCinnabarPreview(show);
    });
    row.appendChild(wrap);
  });

  document.getElementById('cinnabar-preview').style.display = 'none';
  const fuseBtn = document.getElementById('cinnabar-fuse-btn');
  if(fuseBtn) { fuseBtn.style.opacity='0.4'; fuseBtn.style.pointerEvents='none'; }
  // Reset title/subtitle opacity (may have been hidden by previous animation)
  const screen = document.getElementById('cinnabar-screen');
  screen.querySelectorAll('.between-title,.between-subtitle').forEach(el=>{
    el.style.transition='none'; el.style.opacity='1';
  });
  screen.classList.add('visible');
}

function buildFusedCard(a, b) {
  const aHalf = a.name.slice(0, Math.ceil(a.name.length/2));
  const bHalf = b.name.slice(Math.floor(b.name.length/2));
  const fusedName = (aHalf + bHalf).replace(/[^a-zA-Z\-']/g,'');
  const traitsA = typeof getCardTraits==='function' ? getCardTraits(a) : [];
  const traitsB = typeof getCardTraits==='function' ? getCardTraits(b) : [];
  return {
    name: fusedName, img: a.img, fusionImg: b.img,
    atk: Math.max(a.atk||1, b.atk||1),
    hp: (a.hp||2)+(b.hp||2), maxHp:(a.hp||2)+(b.hp||2),
    cost: Math.ceil(((a.cost||2)+(b.cost||2))/2),
    keywords:[...(a.keywords||[]),...(b.keywords||[])].slice(0,2),
    dexA:a.dexA, dexB:b.dexA,
    type1:a.type1, type2:b.type1!==a.type1?b.type1:(b.type2||a.type2),
    traitA:traitsA[0]||null, traitB:traitsB[0]||null,
    _isBonusCard:true, canAttack:false, exhausted:true, divineShieldUp:false,
    attacksLeft:0, frozen:false, stealthed:false,
    id:Math.random().toString(36).slice(2),
  };
}

function updateCinnabarPreview(cards) {
  if(_cinnabarSelected.length < 2) return;
  // When 2 cards selected: trigger the fusion animation immediately
  const a = cards[_cinnabarSelected[0]];
  const b = cards[_cinnabarSelected[1]];
  window._pendingFusion = buildFusedCard(a, b);
  runCinnabarFusionAnimation(a, b, cards);
}


// ══════════════════════════════════════════════════════════════
// CINNABAR FUSION ANIMATION
// ══════════════════════════════════════════════════════════════

// Direct version: no DOM card elements needed (for testing / programmatic use)
function runCinnabarFusionAnimationDirect(cardA, cardB) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const cw = Math.min(window.innerWidth * 0.22, 170);
  // Fake the two cards as starting from left/right of centre
  const fakeA = { left: cx - cw * 2.5, top: cy - cw * 0.75, width: cw, height: cw * 1.5 };
  const fakeB = { left: cx + cw * 1.5, top: cy - cw * 0.75, width: cw, height: cw * 1.5 };
  _runFusionCore(cardA, cardB, fakeA, fakeB, null, null, null);
}

function runCinnabarFusionAnimation(cardA, cardB, allCards) {
  const screen  = document.getElementById('cinnabar-screen');
  const row     = document.getElementById('cinnabar-hand-row');
  if(!row || !screen) { runCinnabarFusionAnimationDirect(cardA, cardB); return; }
  const allWraps = [...row.querySelectorAll('.card-visual')];
  const elA = allWraps[_cinnabarSelected[0]];
  const elB = allWraps[_cinnabarSelected[1]];
  const rA = elA ? elA.getBoundingClientRect() : null;
  const rB = elB ? elB.getBoundingClientRect() : null;
  if(!rA || !rB) { runCinnabarFusionAnimationDirect(cardA, cardB); return; }

  // Fade out unselected cards + UI
  allWraps.forEach((w,i)=>{ if(!_cinnabarSelected.includes(i)){w.style.transition='opacity 0.3s';w.style.opacity='0';w.style.pointerEvents='none';}});
  screen.querySelectorAll('.between-title,.between-subtitle,#cinnabar-preview').forEach(el=>{el.style.transition='opacity 0.3s';el.style.opacity='0';});
  const btns = screen.querySelector('.fusion-btns');
  if(btns){btns.style.transition='opacity 0.3s';btns.style.opacity='0';}
  setTimeout(()=>screen.classList.remove('visible'), 100);

  _runFusionCore(cardA, cardB, rA, rB, allWraps, elA, elB);
}

function _runFusionCore(cardA, cardB, rA, rB, allWraps, elA, elB) {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const cw = Math.min(window.innerWidth * 0.32, 240);
  const ch = cw * 1.5;
  const fusedCard = window._pendingFusion;

  // ── Warp filter ─────────────────────────────────────────────
  const warpDisp = document.querySelector('#crt-warp-filter feDisplacementMap');
  const warpOrig = warpDisp ? +warpDisp.getAttribute('scale') : 40;
  let warpT = 0;
  function animateWarp() {
    warpT = Math.min(warpT + 0.025, 1);
    const v = warpOrig + Math.sin(warpT * Math.PI) * 80;
    if(warpDisp) warpDisp.setAttribute('scale', v.toFixed(1));
    if(warpT < 1) requestAnimationFrame(animateWarp);
    else if(warpDisp) warpDisp.setAttribute('scale', warpOrig.toFixed(1));
  }

  // ── Scanlines ───────────────────────────────────────────────
  const _sl = document.getElementById('crt-scanlines');
  if(_sl) { _sl.style.transition='opacity 0.4s'; _sl.style.opacity='0'; }
  function restoreScanlines() {
    if(_sl) { _sl.style.transition='opacity 0.5s'; _sl.style.opacity=''; }
  }

  // ── Dark bg overlay ─────────────────────────────────────────
  const bg = document.createElement('div');
  bg.style.cssText = 'position:fixed;inset:0;z-index:2990;background:rgba(4,6,16,0);pointer-events:none;transition:background 0.35s ease;';
  document.body.appendChild(bg);
  requestAnimationFrame(()=>{ bg.style.background='rgba(4,6,16,0.92)'; });

  // ── Build a card element (sprite-only, no white bg for evo phase) ──
  function makeFC(imgSrc, fromX, fromY) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;width:${cw}px;height:${ch}px;
      border-radius:10px;overflow:hidden;background:#ffffff;
      border:2px solid rgba(50,70,140,0.8);
      box-shadow:0 8px 32px rgba(0,0,0,0.85);
      will-change:transform,filter;z-index:9995;
      left:${cx-cw/2}px;top:${cy-ch/2}px;`;
    const dx = fromX - cx, dy = fromY - cy;
    el.style.transform = `translate(${dx}px,${dy}px) scale(0.75)`;
    const img = document.createElement('img');
    img.src = imgSrc; img.draggable = false;
    img.style.cssText = 'position:absolute;top:6%;left:50%;transform:translateX(-50%);height:84%;width:auto;object-fit:contain;image-rendering:pixelated;';
    el.appendChild(img);
    el._img = img;
    document.body.appendChild(el);
    return el;
  }

  const srcA = cardA.fusionImg || cardA.img || '';
  const srcB = cardB.fusionImg || cardB.img || '';
  const srcF = (fusedCard && (fusedCard.fusionImg || fusedCard.img)) || srcA;

  const fromAX = rA.left + rA.width/2,  fromAY = rA.top + rA.height/2;
  const fromBX = rB.left + rB.width/2,  fromBY = rB.top + rB.height/2;

  const wA = makeFC(srcA, fromAX, fromAY);
  const wB = makeFC(srcB, fromBX, fromBY);

  // ══ ACT 1: Cards scale up from start positions (200ms) ══════
  setTimeout(()=>{
    const sep = cw * 1.1;
    wA.style.transition = 'transform 280ms cubic-bezier(0.4,0,0.2,1)';
    wB.style.transition = 'transform 280ms cubic-bezier(0.4,0,0.2,1)';
    // A on left leaning right, B on right leaning left
    wA.style.transform = `translate(${-sep}px,0) scale(1) rotate(12deg)`;
    wB.style.transform = `translate(${sep}px,0) scale(1) rotate(-12deg)`;
    requestAnimationFrame(animateWarp);
  }, 100);

  // ══ ACT 2: Both slide to centre, stack, tilt upright (500ms) ═
  setTimeout(()=>{
    const DUR = 480;
    wA.style.transition = `transform ${DUR}ms cubic-bezier(0.6,0,0.2,1)`;
    wB.style.transition = `transform ${DUR}ms cubic-bezier(0.6,0,0.2,1)`;
    // A still leans slightly right as it arrives, B slightly left
    wA.style.transform = 'translate(0,0) scale(1) rotate(6deg)';
    wB.style.transform = 'translate(0,0) scale(1) rotate(-6deg)';
    // After they've stacked, straighten up and start evo
    setTimeout(()=>{
      wA.style.transition = 'transform 200ms ease';
      wB.style.transition = 'transform 200ms ease, opacity 150ms ease';
      wA.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
      wB.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
      if(typeof SFX!=='undefined') SFX.fusionCollide();
      setTimeout(startEvoPhase, 220);
    }, DUR + 40);
  }, 430);

  // ══ ACT 3+4+5: Evolution inside a card ═════════════════════
  // Card A becomes the vessel. Sprite cycles A → B → Fusion as
  // black silhouettes, then colorises to reveal fusion.
  function startEvoPhase() {
    spinning = false;
    // Snap to centre, upright
    wA.style.transition = 'transform 0.1s ease';
    wB.style.transition = 'transform 0.1s ease, opacity 0.1s';
    wA.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
    wB.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
    wB.style.opacity = '0';

    setTimeout(()=>{
      wB.remove();
      // Card stays white with border — silhouette is inside it
      wA.style.boxShadow = '0 8px 32px rgba(0,0,0,0.9)';
      // Go to black silhouette immediately — no transition flash
      wA._img.style.transition = 'none';
      wA._img.style.filter = 'brightness(0) saturate(0)';

      // Sequence of sprites to cycle through (A, B, A, B, A, B… then F)
      // Each swap is instant (no flash — just img src change while black)
      const sprites = [srcA, srcB, srcA, srcB, srcA, srcB, srcA, srcB, srcA, srcB, srcF];
      const CYCLE_MS = 200; // how long each sprite shows while black
      let step = 0;

      function cycleSprite() {
        if(step >= sprites.length - 1) {
          // Last one is fusion — reveal it in colour
          evoReveal();
          return;
        }
        step++;
        if(typeof SFX!=='undefined') SFX.fusionZap();
        wA._img.src = sprites[step];
        setTimeout(cycleSprite, CYCLE_MS);
      }

      // Start cycling after a short settle
      setTimeout(cycleSprite, 300);
    }, 150);
  }

  // ══ Reveal: transition from black silhouette to full colour ═
  function getDominantColor(imgEl, callback) {
    // Load a fresh copy with crossOrigin to allow canvas sampling
    const src = imgEl.src || imgEl.currentSrc;
    if(!src) { callback(null); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const size = 48;
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const data = ctx.getImageData(0, 0, size, size).data;
        // Weighted: more saturated pixels count more
        let r=0,g=0,b=0,weight=0;
        for(let i=0;i<data.length;i+=4){
          const a=data[i+3];
          if(a<60) continue;
          const rv=data[i], gv=data[i+1], bv=data[i+2];
          // Saturation weight: how colourful is this pixel?
          const mx=Math.max(rv,gv,bv), mn=Math.min(rv,gv,bv);
          const sat = mx>0 ? (mx-mn)/mx : 0;
          const w = 0.2 + sat*2.5; // plain grey counts less
          r+=rv*w; g+=gv*w; b+=bv*w; weight+=w;
        }
        if(!weight){ callback(null); return; }
        callback([Math.round(r/weight), Math.round(g/weight), Math.round(b/weight)]);
      } catch(e){ callback(null); }
    };
    img.onerror = ()=>callback(null);
    // Add cache-bust param to force CORS fetch (avoid opaque cache)
    img.src = src.includes('?') ? src : src + '?cors=1';
  }

  function evoReveal() {
    if(typeof SFX!=='undefined') SFX.fusionReveal();
    wA._img.style.transition = 'filter 0.7s ease';
    wA._img.style.filter = 'brightness(1) saturate(1)';
    wA.style.transition = 'background 0.5s, border 0.4s';
    wA.style.background = '#ffffff';
    wA.style.border = '2px solid rgba(50,70,140,0.8)';
    restoreScanlines();

    // After color fully materializes, sample dominant color and tint bg
    setTimeout(()=>{
      getDominantColor(wA._img, (rgb)=>{
        if(rgb) {
          // Darken the dominant color for a moody bg tint
          const dr=Math.round(rgb[0]*0.3), dg=Math.round(rgb[1]*0.3), db=Math.round(rgb[2]*0.3);
          bg.style.transition = 'background 0.8s ease';
          bg.style.background = `rgba(${dr},${dg},${db},0.85)`;
        }
      });
    }, 500);

    // Pop once colour is in, then auto-advance after 1s
    setTimeout(()=>{
      bg.remove();
      wA.style.transition = 'transform 0.18s cubic-bezier(0.2,1.6,0.3,1)';
      wA.style.transform = 'translate(0,0) scale(1.13) rotate(0deg)';
      setTimeout(()=>{
        wA.style.transition = 'transform 0.14s cubic-bezier(0.4,0,0.6,1)';
        wA.style.transform = 'translate(0,0) scale(1) rotate(0deg)';
      }, 180);
      setTimeout(()=>{
        wA.style.transition = 'opacity 0.3s ease';
        wA.style.opacity = '0';
        setTimeout(()=>{ wA.remove(); confirmFusion(); }, 320);
      }, 1000);
    }, 750);
  }
}

function cardDexNums(card) {
  const m = (card.fusionImg||card.img||'').match(/final_(\d+)-[^_]+_(\d+)-/);

  if(card.dexA && card.dexB) return [parseInt(card.dexA)||0, parseInt(card.dexB)||0];

let _marqueeId = null;
function rotomStartMarquee() {
  if(_marqueeId) clearInterval(_marqueeId);
  const el = document.getElementById('rotom-song-title');
  if(!el) return;
  const parent = el.parentElement;
  if(!parent) return;
  el.style.transform = 'translateX(0)';
  const pw = parent.offsetWidth;
  const tw = el.scrollWidth;
  if(tw <= pw) return; // no scroll needed
  let pos = 0;
  const speed = 0.4; // px per frame
  _marqueeId = setInterval(()=>{
    pos -= speed;
    if(pos < -(tw - pw + 20)) pos = pw;
    el.style.transform = `translateX(${pos}px)`;
  }, 16);
}

    if(!_ctx) _ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(_ctx.state==='suspended') _ctx.resume();
    return _ctx;
  }

  // Envelope helper: osc with ADSR-like gain
  function tone(type, freq, t, dur, vol, bend) {
    try {
      const c=ac();
      const o=c.createOscillator(), g=c.createGain();
      const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=8000;
      o.type=type;
      o.frequency.setValueAtTime(freq,t);
      if(bend) o.frequency.exponentialRampToValueAtTime(bend,t+dur);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol*masterVol, t+Math.min(0.008,dur*0.1));
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(lp); lp.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+dur+0.01);
    } catch(e){}
  }

  // Noise burst helper
  function nburst(t, dur, vol, hpFreq=200) {
    try {
      const c=ac();
      const len=Math.ceil(c.sampleRate*dur);
      const buf=c.createBuffer(1,len,c.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
      const src=c.createBufferSource();
      src.buffer=buf;
      const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=hpFreq;
      const g=c.createGain(); g.gain.value=vol*masterVol;
      src.connect(hp); hp.connect(g); g.connect(c.destination);
      src.start(t); src.stop(t+dur+0.01);
    } catch(e){}
  }

  return {
    setVol(v) { masterVol=parseFloat(v); },

    // ── Card flip: whisper-soft paper rustle ──────────────
    cardFlip(delay=0) {
      const c=ac(), t=c.currentTime+delay;
      nburst(t, 0.045, 0.18, 1800);
      tone('sine', 220, t, 0.06, 0.08);
    },

    // ── Card select: pure soft sine, no noise ──────────────
    cardSelect() {
      const c=ac(), t=c.currentTime;
      tone('sine', 880, t,      0.07, 0.16);
      tone('sine', 1320, t+0.02, 0.05, 0.08);
    },

    cardDeselect() {
      const c=ac(), t=c.currentTime;
      tone('sine', 900, t, 0.04, 0.10);
      tone('sine', 500, t, 0.05, 0.05);
    },

    // ── Play hand: Balatro-style card whoosh ──────────────
    // Soft rising sweep, feels weighty but not harsh
    playHand() {
      const c=ac(), t=c.currentTime;
      tone('sine', 180, t,      0.12, 0.28, 420);
      tone('sine', 360, t+0.04, 0.10, 0.16, 720);
      nburst(t+0.06, 0.08, 0.10, 400);
      // Satisfying low thud at peak
      tone('sine', 80, t+0.08, 0.18, 0.35);
    },

    // ── Chips scoring: rapid ascending piano-like pops ────
    scoreChips(chips) {
      const c=ac();
      const steps=Math.max(1,Math.min(Math.ceil(chips/40),10));
      // Pentatonic scale — always sounds musical
      const scale=[261,294,330,392,440,523,587,659,784,880];
      for(let i=0;i<steps;i++) {
        const t=c.currentTime+i*0.048;
        tone('sine', scale[i%scale.length], t, 0.09, 0.22);
        tone('sine', scale[i%scale.length]*2, t, 0.05, 0.08);
      }
    },

    // ── Mult: deep satisfying bass note ──────────────────
    scoreMult(mult) {
      const c=ac(), t=c.currentTime;
      tone('sine', 110, t,      0.22, 0.40);
      tone('sine', 220, t+0.04, 0.18, 0.22);
      tone('sine', 440, t+0.08, 0.12, 0.12);
    },

    // ── Damage: soft thud, not harsh ─────────────────────
    damageHit(dmg) {
      const c=ac(), t=c.currentTime;
      tone('sine', 75, t, 0.22, 0.45, 40);
      tone('sine',150, t, 0.12, 0.20, 60);
      nburst(t, 0.06, 0.08, 100);
    },

    // ── Victory: classic ascending arpeggio ───────────────
    victory() {
      const c=ac();
      // C major arpeggio bright and satisfying
      [[523,0],[659,0.1],[784,0.2],[1047,0.32],[1047,0.5],[784,0.62],[1047,0.74]].forEach(([f,d])=>{
        const t=c.currentTime+d;
        tone('square',f,t,0.12,0.18);
        tone('sine',f*0.5,t,0.16,0.12);
      });
    },

    // ── Discard: soft flutter ─────────────────────────────
    discard() {
      const c=ac(), t=c.currentTime;
      tone('sine', 500, t,      0.07, 0.14, 200);
      tone('sine', 300, t+0.04, 0.07, 0.10, 150);
      nburst(t, 0.05, 0.08, 600);
    },

    // ── Shop open: pleasant bell chime ────────────────────
    shopOpen() {
      const c=ac();
      [[1047,0],[1319,0.07],[1568,0.15]].forEach(([f,d])=>{
        const t=c.currentTime+d;
        tone('sine',f,t,0.25,0.20);
        tone('sine',f*2,t,0.12,0.06);
      });
    },

    // ── Purchase: coin shimmer ────────────────────────────
    purchase() {
      const c=ac();
      [[1200,0],[1600,0.05],[2000,0.10],[1600,0.16],[1200,0.22]].forEach(([f,d])=>{
        tone('sine',f,c.currentTime+d,0.10,0.16);
      });
      tone('sine',600,c.currentTime,0.25,0.12);
    },

    // ── Error / can't afford ──────────────────────────────
    error() {
      const c=ac(), t=c.currentTime;
      tone('square',220,t,      0.10,0.20, 180);
      tone('square',175,t+0.12, 0.14,0.20, 140);
    },

    // ── Route pick: nature rustle ─────────────────────────
    routePick() {
      const c=ac();
      nburst(c.currentTime, 0.07, 0.12, 800);
      [[440,0.02],[554,0.07],[659,0.13]].forEach(([f,d])=>{
        tone('sine',f,c.currentTime+d,0.12,0.16);
      });
    },

    // ── Cinnabar open: fun lab startup ─────────────────────
    cinnabarOpen() {
      const c=ac();
      // Ascending bubbly arpeggio — fun not scary
      [[262,0],[330,0.08],[392,0.16],[523,0.24],[659,0.32],[784,0.40]].forEach(([f,d])=>{
        tone('sine',f,c.currentTime+d,0.18,0.20);
        tone('square',f*2,c.currentTime+d,0.06,0.08);
      });
      // Final sparkle
      tone('sine',1047,c.currentTime+0.52,0.25,0.18);
    },

    // ── Fusion zap: brief electric ────────────────────────
    fusionZap() {
      const c=ac(), t=c.currentTime;
      const f=600+Math.random()*600;
      tone('sawtooth',f,t,0.06,0.18,f*0.2);
      nburst(t,0.04,0.10,1200);
    },

    // ── Fusion collide ────────────────────────────────────
    fusionCollide() {
      const c=ac(), t=c.currentTime;
      tone('sine', 60, t, 0.30, 0.55, 35);

      nburst(t, 0.10, 0.14, 80);

    // ── Fusion reveal: magical shimmer ────────────────────
    fusionReveal() {

      [523,659,784,1047,1319,1568].forEach((f,i)=>{
        const t=c.currentTime+i*0.07;
        tone('sine',f,t,0.35,0.22);
        tone('sine',f*2,t,0.18,0.08);

      tone('sine',1047,c.currentTime+0.5,0.8,0.18);

    // ── Confirm ───────────────────────────────────────────
    confirm() {
      const c=ac(), t=c.currentTime;
      tone('sine',660,t,      0.09,0.20);
      tone('sine',880,t+0.07, 0.12,0.18);

    skip() {

    },

    // ── Battle start ──────────────────────────────────────
    battleStart(isGym=false) {
      const c=ac(), t=c.currentTime;
      if(isGym) {
        tone('square',110,t,     0.12,0.40);
        tone('square',220,t+0.1, 0.12,0.35);

        tone('square',880,t+0.3, 0.20,0.45);
        tone('sine',  440,t+0.45,0.5, 0.28);
      } else {
        tone('square',330,t,     0.09,0.28);

    noDiscards() {

    // ── Starter deck choose ──────────────────────────────
    starterChoose() {
